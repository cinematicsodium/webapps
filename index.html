<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Apps</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --panel: #131a2a;
      --text: #eef2ff;
      --muted: #b8c1d9;
      --border: #32405f;
      --accent: #7dd3fc;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f3f6fb;
        --panel: #ffffff;
        --text: #122033;
        --muted: #5c6780;
        --border: #d7dfec;
        --accent: #0369a1;
        --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .app {
      width: min(640px, calc(100% - 2rem));
      margin: 3rem auto;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
      line-height: 1.15;
    }

    p {
      margin: 0 0 2rem;
      color: var(--muted);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 0.75rem;
    }

    li a {
      display: block;
      padding: 1.1rem 1.4rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--accent);
      font-weight: 600;
      font-size: 1.05rem;
      transition: opacity 0.15s;
    }

    li a:hover {
      opacity: 0.8;
    }

    li a .desc {
      display: block;
      margin-top: 0.25rem;
      font-weight: 400;
      font-size: 0.92rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Web Apps</h1>
    <p>A collection of small, self-contained web tools.</p>
    <ul>
      <li>
        <a href="dose_converter_app.html">
          Dose ↔ Units Calculator
          <span class="desc">Convert between dose (mg) and syringe units using concentration and units-per-mL.</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
